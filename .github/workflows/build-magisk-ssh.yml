name: Build Magisk SSH

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-src

      - name: Build WebUI
        run: npm run build
        working-directory: ui-src

      - name: Upload webroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: webroot
          path: webroot/
          retention-days: 1

  build-MagiskSSH:
    runs-on: ubuntu-latest
    needs: build-webui

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            wget \
            p7zip-full \
            perl \
            autoconf \
            patch \
            zip

      - name: Clone GitLab MagiskSSH repository
        run: |
          git clone https://gitlab.com/d4rcm4rc/MagiskSSH.git magisk-ssh
          cd magisk-ssh
          echo "REPO_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 只替换运行时脚本/配置文件中的路径，绝对不碰 .mk 构建规则
      - name: Patch runtime paths (/data/ssh -> /data/adb/ssh)
        working-directory: magisk-ssh
        run: |
          # Runtime shell scripts
          find . -type f -name "*.sh" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          # opensshd.init (no .sh extension)
          [ -f common/opensshd.init ] && sed -i 's|/data/ssh|/data/adb/ssh|g' common/opensshd.init
          [ -f opensshd.init ]        && sed -i 's|/data/ssh|/data/adb/ssh|g' opensshd.init
          # Any .conf / config files
          find . -type f -name "*.conf" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          # .patch files (applied against source, not the build system)
          find . -type f -name "*.patch" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          echo "Patched runtime files:"
          grep -rl "/data/adb/ssh" . --include="*.sh" --include="*.conf" --include="*.patch" \
            --include="opensshd.init" 2>/dev/null || true

      # configure flags 在 .mk 里的 --sysconfdir / --with-pid-dir，精确替换这两个 flag
      - name: Patch configure flags (/data/ssh -> /data/adb/ssh)
        working-directory: magisk-ssh
        run: |
          find . -type f -name "*.mk" | xargs grep -l "sysconfdir\|pid-dir\|piddir" 2>/dev/null | while read f; do
            sed -i \
              -e 's|--sysconfdir=/data/ssh|--sysconfdir=/data/adb/ssh|g' \
              -e 's|--with-pid-dir=/data/ssh|--with-pid-dir=/data/adb/ssh|g' \
              -e 's|sysconfdir=/data/ssh|sysconfdir=/data/adb/ssh|g' \
              -e 's|piddir=/data/ssh|piddir=/data/adb/ssh|g' \
              "$f"
            echo "  Patched configure flags in: $f"
          done

      - name: Build Module
        working-directory: magisk-ssh
        env:
          ANDROID_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build
          cd build
          # all_arches.mk 期望在 build/ 子目录下执行（内部通过 ../ 引用源码根）
          make -f ../all_arches.mk \
            ANDROID_ROOT="$ANDROID_ROOT" \
            -j$(nproc) zip

      - name: Download webroot artifact
        uses: actions/download-artifact@v4
        with:
          name: webroot
          path: webroot-dist

      - name: Inject WebUI and scripts into module zip
        working-directory: magisk-ssh/build
        run: |
          MODULE_ZIP=$(find . -name "*.zip" -type f | head -n 1)
          if [ -z "$MODULE_ZIP" ]; then
            echo "::error::No module zip found after build!"
            exit 1
          fi
          
          # Rename zip to the desired final name
          mv "$MODULE_ZIP" "Patched-MagiskSSH.zip"
          MODULE_ZIP="Patched-MagiskSSH.zip"
          
          echo "Injecting WebUI, scripts and customize.sh into $MODULE_ZIP..."
          INJECT_DIR=$(mktemp -d)
          mkdir -p "$INJECT_DIR/webroot" "$INJECT_DIR/scripts"

          # WebUI build output → module root webroot/
          cp -r "$GITHUB_WORKSPACE/webroot-dist/"* "$INJECT_DIR/webroot/"

          # action.sh + customize.sh → module ROOT
          cp "$GITHUB_WORKSPACE/scripts/action.sh"    "$INJECT_DIR/action.sh"
          cp "$GITHUB_WORKSPACE/scripts/customize.sh" "$INJECT_DIR/customize.sh"
          chmod 755 "$INJECT_DIR/action.sh" "$INJECT_DIR/customize.sh"

          # api.sh and other scripts → scripts/ subdir (called by WebUI via api.sh)
          for f in "$GITHUB_WORKSPACE/scripts/"*.sh; do
            [ "$(basename "$f")" = "action.sh" ] && continue
            [ "$(basename "$f")" = "customize.sh" ] && continue
            cp "$f" "$INJECT_DIR/scripts/"
            chmod 755 "$INJECT_DIR/scripts/$(basename "$f")"
          done

          ABS_ZIP="$GITHUB_WORKSPACE/magisk-ssh/build/$MODULE_ZIP"

          # Extract and modify module.prop
          unzip -p "$ABS_ZIP" module.prop > "$INJECT_DIR/module.prop"
          UPDATE_JSON_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/update.json"
          if grep -q "^updateJson=" "$INJECT_DIR/module.prop"; then
            sed -i "s|^updateJson=.*|updateJson=${UPDATE_JSON_URL}|" "$INJECT_DIR/module.prop"
          else
            echo "updateJson=${UPDATE_JSON_URL}" >> "$INJECT_DIR/module.prop"
          fi
          
          # Extract upstream information for creating our own update.json
          UPSTREAM_VERSION=$(grep "^version=" "$INJECT_DIR/module.prop" | cut -d'=' -f2)
          UPSTREAM_VCODE=$(grep "^versionCode=" "$INJECT_DIR/module.prop" | cut -d'=' -f2)
          
          cat <<EOF > "$GITHUB_WORKSPACE/magisk-ssh/build/update.json"
          {
              "version": "${UPSTREAM_VERSION}",
              "versionCode": ${UPSTREAM_VCODE},
              "zipUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/Patched-MagiskSSH.zip",
              "changelog": "https://github.com/${GITHUB_REPOSITORY}/releases/latest"
          }
          EOF
          echo "Generated update.json for release."
          
          # Pass version info to the next steps for Release naming
          echo "MODULE_VERSION=${UPSTREAM_VERSION}" >> $GITHUB_ENV
          echo "MODULE_VCODE=${UPSTREAM_VCODE}" >> $GITHUB_ENV

          # Extract, patch, and re-inject opensshd.init
          mkdir -p "$INJECT_DIR/common"
          unzip -p "$ABS_ZIP" common/opensshd.init > "$INJECT_DIR/common/opensshd.init"
          (cd "$INJECT_DIR" && python3 "$GITHUB_WORKSPACE/tools/patch_init.py")
          
          # Inject new files into zip
          (cd "$INJECT_DIR" && zip -r "$ABS_ZIP" module.prop common/opensshd.init customize.sh action.sh webroot/ scripts/)

          # Remove legacy install.sh if present (customize.sh is the replacement)
          if unzip -l "$ABS_ZIP" install.sh >/dev/null 2>&1; then
            zip -d "$ABS_ZIP" install.sh
            echo "  Removed legacy install.sh from zip"
          fi

          rm -rf "$INJECT_DIR"
          echo "Injection complete:"
          echo "  customize.sh     → module root (replaces install.sh)"
          echo "  action.sh        → module root"
          echo "  webroot/         → $(find "$GITHUB_WORKSPACE/webroot-dist" -type f | wc -l) files"
          echo "  scripts/         → $(ls "$GITHUB_WORKSPACE/scripts/"*.sh | grep -v action.sh | wc -l) scripts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MODULE_VERSION }}
          name: Release ${{ env.MODULE_VERSION }} (Commit ${{ env.REPO_COMMIT }})
          files: |
            magisk-ssh/build/Patched-MagiskSSH.zip
            magisk-ssh/build/update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
