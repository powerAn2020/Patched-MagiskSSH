name: Build Magisk SSH

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-webui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-src

      - name: Build WebUI
        run: npm run build
        working-directory: ui-src

      - name: Upload webroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: webroot
          path: webroot/
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: build-webui

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            wget \
            p7zip-full \
            perl \
            autoconf \
            patch \
            zip

      - name: Clone GitLab MagiskSSH repository
        run: |
          git clone https://gitlab.com/d4rcm4rc/MagiskSSH.git magisk-ssh
          cd magisk-ssh
          echo "REPO_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 只替换运行时脚本/配置文件中的路径，绝对不碰 .mk 构建规则
      - name: Patch runtime paths (/data/ssh -> /data/adb/ssh)
        working-directory: magisk-ssh
        run: |
          # Runtime shell scripts
          find . -type f -name "*.sh" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          # opensshd.init (no .sh extension)
          [ -f common/opensshd.init ] && sed -i 's|/data/ssh|/data/adb/ssh|g' common/opensshd.init
          [ -f opensshd.init ]        && sed -i 's|/data/ssh|/data/adb/ssh|g' opensshd.init
          # Any .conf / config files
          find . -type f -name "*.conf" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          # .patch files (applied against source, not the build system)
          find . -type f -name "*.patch" \
            -exec sed -i 's|/data/ssh|/data/adb/ssh|g' {} +
          echo "Patched runtime files:"
          grep -rl "/data/adb/ssh" . --include="*.sh" --include="*.conf" --include="*.patch" \
            --include="opensshd.init" 2>/dev/null || true

      # opensshd.init 默认启动时没有日志输出，补丁添加 -E 日志重定向
      - name: Patch opensshd.init to enable logging
        working-directory: magisk-ssh
        run: python3 $GITHUB_WORKSPACE/tools/patch_init.py

      # configure flags 在 .mk 里的 --sysconfdir / --with-pid-dir，精确替换这两个 flag
      - name: Patch configure flags (/data/ssh -> /data/adb/ssh)
        working-directory: magisk-ssh
        run: |
          find . -type f -name "*.mk" | xargs grep -l "sysconfdir\|pid-dir\|piddir" 2>/dev/null | while read f; do
            sed -i \
              -e 's|--sysconfdir=/data/ssh|--sysconfdir=/data/adb/ssh|g' \
              -e 's|--with-pid-dir=/data/ssh|--with-pid-dir=/data/adb/ssh|g' \
              -e 's|sysconfdir=/data/ssh|sysconfdir=/data/adb/ssh|g' \
              -e 's|piddir=/data/ssh|piddir=/data/adb/ssh|g' \
              "$f"
            echo "  Patched configure flags in: $f"
          done

      - name: Build Module
        working-directory: magisk-ssh
        env:
          ANDROID_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build
          cd build
          # all_arches.mk 期望在 build/ 子目录下执行（内部通过 ../ 引用源码根）
          make -f ../all_arches.mk \
            ANDROID_ROOT="$ANDROID_ROOT" \
            -j$(nproc) zip

      - name: Download webroot artifact
        uses: actions/download-artifact@v4
        with:
          name: webroot
          path: webroot-dist

      - name: Inject WebUI and scripts into module zip
        working-directory: magisk-ssh/build
        run: |
          MODULE_ZIP=$(find . -name "*.zip" -type f | head -n 1)
          if [ -z "$MODULE_ZIP" ]; then
            echo "::error::No module zip found after build!"
            exit 1
          fi
          echo "Injecting WebUI and scripts into $MODULE_ZIP..."
          INJECT_DIR=$(mktemp -d)
          mkdir -p "$INJECT_DIR/webroot" "$INJECT_DIR/scripts"

          # WebUI build output → module root webroot/
          cp -r "$GITHUB_WORKSPACE/webroot-dist/"* "$INJECT_DIR/webroot/"

          # action.sh → module ROOT (KernelSU hardcodes $MODPATH/action.sh)
          cp "$GITHUB_WORKSPACE/scripts/action.sh" "$INJECT_DIR/action.sh"
          chmod 755 "$INJECT_DIR/action.sh"

          # api.sh and other scripts → scripts/ subdir (called by WebUI via api.sh)
          for f in "$GITHUB_WORKSPACE/scripts/"*.sh; do
            [ "$(basename "$f")" = "action.sh" ] && continue
            cp "$f" "$INJECT_DIR/scripts/"
            chmod 755 "$INJECT_DIR/scripts/$(basename "$f")"
          done

          (cd "$INJECT_DIR" && zip -r "$GITHUB_WORKSPACE/magisk-ssh/build/$MODULE_ZIP" action.sh webroot/ scripts/)
          rm -rf "$INJECT_DIR"
          echo "Injection complete:"
          echo "  action.sh        → module root"
          echo "  webroot/         → $(find "$GITHUB_WORKSPACE/webroot-dist" -type f | wc -l) files"
          echo "  scripts/         → $(ls "$GITHUB_WORKSPACE/scripts/"*.sh | grep -v action.sh | wc -l) scripts"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-ssh-${{ env.REPO_COMMIT }}
          path: magisk-ssh/build/*.zip
