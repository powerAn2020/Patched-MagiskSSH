name: Build Magisk SSH

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-webui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-src

      - name: Build WebUI
        run: npm run build
        working-directory: ui-src

      - name: Upload webroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: webroot
          path: webroot/
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: build-webui

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            wget \
            p7zip-full \
            perl \
            autoconf \
            patch \
            zip

      - name: Clone GitLab MagiskSSH repository
        run: |
          git clone https://gitlab.com/d4rcm4rc/MagiskSSH.git magisk-ssh
          cd magisk-ssh
          echo "REPO_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 所有 patch/sed/make 操作须在 magisk-ssh/ 目录内执行
      - name: Patch Paths (/data/ssh/ -> /data/adb/ssh/)
        working-directory: magisk-ssh
        run: |
          find . -type f \( \
            -name "*.patch" -o -name "*.sh" -o -name "*.mk" \
            -o -name "*.conf" -o -name "install.sh" \
          \) -exec sed -i 's|/data/ssh/|/data/adb/ssh/|g' {} +
          # Handle paths without trailing slash too (e.g. piddir=/data/ssh)
          find . -type f \( -name "*.mk" -o -name "*.sh" -o -name "*.conf" \) \
            -exec sed -i 's|=/data/ssh$|=/data/adb/ssh|g' {} +
          echo "Patched files:"
          grep -rl "/data/adb/ssh" . --include="*.sh" --include="*.mk" --include="*.conf" --include="*.patch" || true

      - name: Build Module
        working-directory: magisk-ssh
        env:
          ANDROID_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build
          make -f all_arches.mk \
            BUILD_DIR="$(pwd)/build" \
            ANDROID_ROOT="$ANDROID_ROOT" \
            -j$(nproc) zip

      - name: Download webroot artifact
        uses: actions/download-artifact@v4
        with:
          name: webroot
          path: webroot-dist

      - name: Inject WebUI and scripts into module zip
        working-directory: magisk-ssh/build
        run: |
          MODULE_ZIP=$(find . -name "*.zip" -type f | head -n 1)
          if [ -z "$MODULE_ZIP" ]; then
            echo "::error::No module zip found after build!"
            exit 1
          fi
          echo "Injecting WebUI into $MODULE_ZIP..."
          INJECT_DIR=$(mktemp -d)
          mkdir -p "$INJECT_DIR/webroot" "$INJECT_DIR/scripts"
          cp -r "$GITHUB_WORKSPACE/webroot-dist/"* "$INJECT_DIR/webroot/"
          cp "$GITHUB_WORKSPACE/scripts/api.sh" "$INJECT_DIR/scripts/"
          chmod 755 "$INJECT_DIR/scripts/api.sh"
          (cd "$INJECT_DIR" && zip -r "$GITHUB_WORKSPACE/magisk-ssh/build/$MODULE_ZIP" webroot/ scripts/)
          rm -rf "$INJECT_DIR"
          echo "Injection complete."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-ssh-${{ env.REPO_COMMIT }}
          path: magisk-ssh/build/*.zip
