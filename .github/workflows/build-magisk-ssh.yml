name: Build Magisk SSH

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            wget \
            p7zip-full \
            perl \
            autoconf \
            patch

      # patches/*.patch 和各 .sh 在 Make 下载/展开源码前修改，时序正确
      - name: Patch Paths (/data/ssh/ -> /data/adb/ssh/)
        run: |
          sed -i 's|/data/ssh/|/data/adb/ssh/|g' patches/*.patch
          sed -i 's|/data/ssh/|/data/adb/ssh/|g' module_data/install.sh
          sed -i 's|/data/ssh/|/data/adb/ssh/|g' module_data/uninstall.sh
          sed -i 's|/data/ssh/|/data/adb/ssh/|g' module_data/common/service.sh

      # 同时替换 openssh.mk 中 configure 阶段写死的 --sysconfdir 和 --with-pid-dir
      - name: Patch openssh.mk Configure Flags
        run: |
          sed -i 's|--sysconfdir=/data/ssh|--sysconfdir=/data/adb/ssh|g' openssh.mk
          sed -i 's|--with-pid-dir=/data/ssh|--with-pid-dir=/data/adb/ssh|g' openssh.mk

      - name: Build Module
        env:
          ANDROID_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build
          # BUILD_DIR 必须是绝对路径传给 make，避免 realpath 失败
          make -f all_arches.mk \
            BUILD_DIR="$(pwd)/build" \
            ANDROID_ROOT="$ANDROID_ROOT" \
            -j$(nproc) zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk_ssh_v0.26.zip
          path: build/magisk_ssh_v*.zip
